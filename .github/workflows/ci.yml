name: idlewuxia-ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  r0-scope-and-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate R0 scope and active runtime
        run: npm run task:preflight

      - name: Build, sync, and verify three-layer web freshness
        run: npm run android:sync
